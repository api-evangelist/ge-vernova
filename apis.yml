aid: ge-vernova
name: GE Vernova
description: >-
  GE Vernova is accelerating the path to more reliable, affordable, and
  sustainable energy through its innovative portfolio of electrification,
  power, and decarbonization technologies. Spun off from General Electric, GE
  Vernova brings together the legacy GE Power, Renewable Energy, Digital, and
  Energy Financial Services businesses to help solve the world's energy
  transition challenges.
